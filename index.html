<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>US Cities by Population Size</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        #map { height: 500px; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([37.8, -96], 4);

        setTimeout(() => {
            map.invalidateSize();
        }, 1000);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        function getRadius(population) {
            let pop = Number(population); // Convert to number if needed
            if (isNaN(pop) || pop <= 0) {
                console.warn("Invalid population data:", population);
                return 5; // Default small circle for missing/invalid data
            }

            let radius = Math.max(5, Math.sqrt(pop) / 50); // Adjust divisor for better scaling
            console.log(`Population: ${pop}, Calculated Radius: ${radius}`);
            return radius;
        }

        fetch('data/USA_Major_Cities.geojson')
            .then(response => response.json())
            .then(data => {
                console.log("GeoJSON Data Loaded:", data); // Debugging log

                // Log the structure of the first feature's properties to debug population
                console.log("First Feature Properties:", data.features[0].properties);

                L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        if (!feature.properties || !feature.geometry || !feature.geometry.coordinates) {
                            console.warn("Skipping invalid feature:", feature);
                            return null; // Skip invalid entries
                        }

                        // Log the feature's properties to inspect the population field
                        console.log(`Feature Properties: ${JSON.stringify(feature.properties)}`);

                        let cityName = feature.properties.name || "Unknown City";
                        let population = feature.properties.population || "Unknown"; // Default to Unknown if population is missing

                        console.log(`City: ${cityName}, Population: ${population}`); // Log the population value

                        return L.circleMarker(latlng, {
                            radius: getRadius(population), // Apply radius scaling based on population
                            color: "blue",
                            fillColor: "lightblue",
                            fillOpacity: 0.5,
                            weight: 1
                        });
                    },
                    onEachFeature: function (feature, layer) {
                        if (feature.properties && feature.properties.name) {
                            layer.bindPopup(
                                `<b>City: ${feature.properties.name}</b><br>Population: ${feature.properties.population ? feature.properties.population.toLocaleString() : "Unknown"}`
                            );
                        }
                    }
                }).addTo(map);
            })
            .catch(error => console.error('Error loading GeoJSON file:', error));
    </script>
</body>
</html>
