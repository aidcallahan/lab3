<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>US Cities by Population Size</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        #map { height: 500px; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([37.8, -96], 4);

        setTimeout(() => {
            map.invalidateSize();
        }, 1000);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        function getRadius(population) {
            if (!population || isNaN(population)) return 5; // Default size if population is missing
            return Math.sqrt(population) / 1000; // Adjust scale as needed
        }

        fetch('data/USA_Major_Cities.geojson')
            .then(response => response.json())
            .then(data => {
                console.log("GeoJSON Data:", data); // Debugging log

                L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        if (!feature.properties || !feature.geometry || !feature.geometry.coordinates) {
                            console.warn("Skipping invalid feature:", feature);
                            return null; // Skip invalid entries
                        }

                        return L.circleMarker(latlng, {
                            radius: getRadius(feature.properties.population),
                            color: "blue",
                            fillColor: "lightblue",
                            fillOpacity: 0.5,
                            weight: 1
                        });
                    },
                    onEachFeature: function (feature, layer) {
                        if (feature.properties && feature.properties.name) {
                            layer.bindPopup(
                                `<b>${feature.properties.name}</b><br>Population: ${feature.properties.population || 'Unknown'}`
                            );
                        }
                    }
                }).addTo(map);
            })
            .catch(error => console.error('Error loading file', error));
    </script>
</body>
</html>
